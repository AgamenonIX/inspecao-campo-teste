<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#1e3a5f">
<title>Painel de Inspeções — SESMT</title>
<link rel="icon" href="./logo.png">
<script src="./chart.umd.min.js"></script>
<style>
  :root{
    --azul:#1e3a5f;
    --azul-claro:#2d5586;
    --verde:#22c55e;
    --vermelho:#dc2626;
    --amarelo:#f59e0b;
    --cinza-bg:#f1f5f9;
    --cinza-borda:#cbd5e1;
    --texto:#1e293b;
    --texto-claro:#64748b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    background:var(--cinza-bg);
    color:var(--texto);
    padding-bottom:40px;
  }
  header{
    background:var(--azul);color:#fff;padding:20px 16px;
    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;
  }
  header h1{margin:0;font-size:20px;}
  header p{margin:4px 0 0;font-size:13px;opacity:.85;}
  #btn-atualizar{
    background:#fff;color:var(--azul);border:none;padding:10px 16px;
    border-radius:8px;font-weight:700;font-size:13.5px;cursor:pointer;
  }

  main{max-width:1100px;margin:0 auto;padding:20px 16px;}

  .cards-resumo{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px;}
  .card-numero{background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.08);text-align:center;}
  .card-numero .valor{font-size:30px;font-weight:800;color:var(--azul);}
  .card-numero .rotulo{font-size:12.5px;color:var(--texto-claro);margin-top:4px;}

  .graficos{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
  @media (max-width:800px){.graficos{grid-template-columns:1fr;}}
  .card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
  .card h3{margin:0 0 12px;font-size:15px;color:var(--azul);}
  .card canvas{max-height:280px;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{border-bottom:1px solid #eef2f6;padding:9px 8px;text-align:left;vertical-align:top;}
  th{color:var(--texto-claro);font-weight:700;font-size:12px;text-transform:uppercase;}
  .tabela-scroll{overflow-x:auto;}

  #estado-carregando, #estado-erro, #estado-vazio{
    text-align:center;padding:60px 20px;color:var(--texto-claro);
  }
  #estado-erro{color:var(--vermelho);}
  .aviso-config{
    background:#fef3c7;border:1px solid #fde68a;border-radius:10px;
    padding:14px;font-size:13.5px;color:#92400e;margin-bottom:16px;line-height:1.5;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>📊 Painel de Inspeções</h1>
    <p>Omega Service — S11D / Canaã dos Carajás</p>
  </div>
  <button id="btn-atualizar">🔄 Atualizar dados</button>
</header>

<main>
  <div id="aviso-config" class="aviso-config" style="display:none;"></div>
  <div id="estado-carregando">Carregando dados...</div>
  <div id="estado-erro" style="display:none;"></div>
  <div id="estado-vazio" style="display:none;">Nenhuma inspeção recebida ainda.</div>

  <div id="conteudo" style="display:none;">
    <div class="cards-resumo" id="cards-resumo"></div>

    <div class="graficos">
      <div class="card">
        <h3>Inspeções por Encarregado</h3>
        <canvas id="grafico-encarregado"></canvas>
      </div>
      <div class="card">
        <h3>Inspeções por Dia</h3>
        <canvas id="grafico-dia"></canvas>
      </div>
    </div>

    <div class="card">
      <h3>Últimas inspeções recebidas</h3>
      <div class="tabela-scroll">
        <table id="tabela-recentes">
          <thead>
            <tr><th>Data</th><th>Encarregado</th><th>Local</th><th>Desvio</th><th>Fotos</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<script>
/* ============================================================
   CONFIGURAÇÃO — mesma URL do Apps Script usada no app de campo
   (arquivo index.html). Precisa ser a mesma para os dados baterem.
   ============================================================ */
const SUPABASE_URL = "https://vfwhdkfxjkjoczerwnnz.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmd2hka2Z4amtqb2N6ZXJ3bm56Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMzM2MDUsImV4cCI6MjA5OTcwOTYwNX0.r6mu_cXTTnae04UUQi8BQJswp0fHTqSOI5pbqRC93iY";

let graficoEncarregado = null;
let graficoDia = null;

async function carregarDados() {
  document.getElementById('estado-carregando').style.display = 'block';
  document.getElementById('estado-erro').style.display = 'none';
  document.getElementById('estado-vazio').style.display = 'none';
  document.getElementById('conteudo').style.display = 'none';

  if (SUPABASE_URL.includes('COLE_AQUI') || SUPABASE_ANON_KEY.includes('COLE_AQUI')) {
    document.getElementById('estado-carregando').style.display = 'none';
    const aviso = document.getElementById('aviso-config');
    aviso.style.display = 'block';
    aviso.textContent = '⚠️ Este painel ainda não está configurado — falta colar a URL e a chave do Supabase no arquivo dashboard.html (mesmas usadas no index.html do app de campo).';
    return;
  }

  try {
    const resposta = await fetch(`${SUPABASE_URL}/rest/v1/inspecoes?select=*&order=criado_em.desc`, {
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
      }
    });
    if (!resposta.ok) throw new Error('Servidor respondeu ' + resposta.status);
    const dados = await resposta.json();

    document.getElementById('estado-carregando').style.display = 'none';

    if (!dados || dados.length === 0) {
      document.getElementById('estado-vazio').style.display = 'block';
      return;
    }

    renderTudo(dados);
    document.getElementById('conteudo').style.display = 'block';

  } catch (err) {
    document.getElementById('estado-carregando').style.display = 'none';
    const estadoErro = document.getElementById('estado-erro');
    estadoErro.style.display = 'block';
    estadoErro.textContent = '❌ Não foi possível carregar os dados: ' + err.message + '. Confira sua internet e tente atualizar novamente.';
  }
}

function contarPor(dados, chave) {
  const contagem = {};
  dados.forEach(linha => {
    const valor = (linha[chave] || 'Não informado').toString().trim() || 'Não informado';
    contagem[valor] = (contagem[valor] || 0) + 1;
  });
  return contagem;
}

function renderTudo(dados) {
  // --- Cards resumo ---
  const totalInspecoes = dados.length;
  const encarregadosUnicos = new Set(dados.map(d => d['encarregado'])).size;
  const locaisUnicos = new Set(dados.map(d => d['local']).filter(Boolean)).size;
  const hoje = new Date().toISOString().slice(0,10);
  const hojeCount = dados.filter(d => (d['data']||'').toString().slice(0,10) === hoje).length;

  document.getElementById('cards-resumo').innerHTML = `
    <div class="card-numero"><div class="valor">${totalInspecoes}</div><div class="rotulo">Total de inspeções</div></div>
    <div class="card-numero"><div class="valor">${encarregadosUnicos}</div><div class="rotulo">Encarregados ativos</div></div>
    <div class="card-numero"><div class="valor">${locaisUnicos}</div><div class="rotulo">Locais diferentes</div></div>
    <div class="card-numero"><div class="valor">${hojeCount}</div><div class="rotulo">Inspeções hoje</div></div>
  `;

  // --- Gráfico: inspeções por encarregado ---
  const porEncarregado = contarPor(dados, 'encarregado');
  const ctxEnc = document.getElementById('grafico-encarregado').getContext('2d');
  if (graficoEncarregado) graficoEncarregado.destroy();
  graficoEncarregado = new Chart(ctxEnc, {
    type: 'bar',
    data: {
      labels: Object.keys(porEncarregado),
      datasets: [{ label: 'Inspeções', data: Object.values(porEncarregado), backgroundColor: '#2d5586' }]
    },
    options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
  });

  // --- Gráfico: inspeções por dia ---
  const porDia = {};
  dados.forEach(d => {
    const dia = (d['data'] || '').toString().slice(0,10);
    if (!dia) return;
    porDia[dia] = (porDia[dia] || 0) + 1;
  });
  const diasOrdenados = Object.keys(porDia).sort();
  const ctxDia = document.getElementById('grafico-dia').getContext('2d');
  if (graficoDia) graficoDia.destroy();
  graficoDia = new Chart(ctxDia, {
    type: 'line',
    data: {
      labels: diasOrdenados,
      datasets: [{ label: 'Inspeções', data: diasOrdenados.map(d => porDia[d]), borderColor: '#22c55e', backgroundColor: 'rgba(34,197,94,.15)', fill: true, tension: .25 }]
    },
    options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
  });

  // --- Tabela das mais recentes ---
  const recentes = [...dados].sort((a,b) => new Date(b['criado_em']) - new Date(a['criado_em'])).slice(0, 20);
  const corpo = document.querySelector('#tabela-recentes tbody');
  corpo.innerHTML = recentes.map(d => {
    const qtdFotos = (d['fotos_urls'] || '').toString().split(',').filter(Boolean).length;
    return `<tr>
      <td>${d['data'] || '-'} ${d['hora'] || ''}</td>
      <td>${d['encarregado'] || '-'}</td>
      <td>${d['local'] || '-'}</td>
      <td>${(d['desvio'] || '-').toString().slice(0, 80)}${(d['desvio']||'').length > 80 ? '…' : ''}</td>
      <td>${qtdFotos}</td>
    </tr>`;
  }).join('');
}

document.getElementById('btn-atualizar').addEventListener('click', carregarDados);
carregarDados();
</script>

</body>
</html>
